name: Build JSON module and Redis Server
description: |
  Build JSON module and Redis Server

inputs:
  redis-ref:
    description: 'Redis ref to checkout'
    type: string
    required: true
  run_sanitizer:
    type: boolean
    default: false

runs:
  using: composite
  steps:
    - name: echo inputs
      shell: bash
      run: |
        echo "redis-ref=${{ inputs.redis-ref }}"
        echo "run_sanitizer=${{ inputs.run_sanitizer }}"

    - name: Build Redis SANITIZER
      shell: bash
      if: ${{inputs.run_sanitizer == true}}
      working-directory: redis
      run: |
        echo "::group::Build Redis"
        make SANITIZER=address install -j `nproc`
        echo "REDIS_SERVER=$GITHUB_WORKSPACE/redis/src/redis-server" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/redis/src" >> $GITHUB_PATH
        export PATH="$GITHUB_WORKSPACE/redis/src:$PATH"
        echo "::endgroup::"
    - name: Build Redis
      shell: bash
      if: ${{inputs.run_sanitizer == false}}
      working-directory: redis
      run: |
        echo "::group::Build Redis"
        make install -j `nproc`
        echo "REDIS_SERVER=$GITHUB_WORKSPACE/redis/src/redis-server" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/redis/src" >> $GITHUB_PATH
        export PATH="$GITHUB_WORKSPACE/redis/src:$PATH"
        echo "::endgroup::"
    - name: Build module
      shell: bash
      if: ${{inputs.run_sanitizer == false}}
      run: |
        echo ::group::Build module
        . scl_source enable devtoolset-11 || true
        make -j `nproc`
        echo ::endgroup::
    - name: Build module SANITIZER
      if: ${{inputs.run_sanitizer}}
      shell: bash
      run: |
        echo ::group::Build module
        . scl_source enable devtoolset-11 || true
        make SAN=addr -j `nproc`
        echo ::endgroup::

