name: Build JSON module and Redis Server
description: |
  Build JSON module and Redis Server

inputs:
  redis-ref:
    description: 'Redis ref to checkout'
    type: string
    required: true
  run_sanitizer:
    type: string

runs:
  using: composite
  steps:
    - name: Get Redis
      shell: bash
      run: |
      # Perform checkout
      REPO_URL="https://github.com/redis/redis.git"
      # Clone the repository to the current directory
      git clone --recurse-submodules --depth=1 $REPO_URL redis
      cd redis
      git fetch origin ${{inputs.redis-ref}}
      git checkout ${{inputs.redis-ref}}
    - name: Build Redis
      shell: bash
      working-directory: redis
      run: |
        echo "::group::Build Redis"
        make SANITIZER=${{inputs.run_sanitizer && 'address' || ''}} install -j `nproc`
        echo "REDIS_SERVER=$GITHUB_WORKSPACE/redis/src/redis-server" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/redis/src" >> $GITHUB_PATH
        export PATH="$GITHUB_WORKSPACE/redis/src:$PATH"
        redis-server --version
        echo "::endgroup::"
    - name: Build module
      shell: bash
      run: |
        echo ::group::Build module
        . scl_source enable devtoolset-11 || true
        make SAN=${{inputs.run_sanitizer && 'addr' || ''}} -j `nproc`
        echo ::endgroup::
