name: Install Python dependencies

inputs:
  call-setup:
    description: 'whether to call ./sbin/setup or not'
    type: string
    required: true
    default: '0'
  use-venv:
    type: string
    description: 'Specify whether to use the environment or not'
    default: '0'
  extra-packages-to-install:
    type: string
    default: ''
    required: false

runs:
  using: composite
  steps:
    - name: Install Python dependencies
      shell: bash
      run: |
        if command -v scl_source &> /dev/null
        then
            . scl_source enable devtoolset-11 || true
        fi
        # Add /usr/local/bin to PATH for Rocky Linux Python
        export PATH="/usr/local/bin:$PATH"
        if [[ "${{ inputs.use-venv }}" == "1" ]]; then
          echo ::group::Activate virtual environment
            # venv was created and populated by install_script.sh's
            # lib/setup-python.sh (uv venv + pinned pip + build_package_requirements.txt
            # + tests/flow/requirements.txt). Just activate it here and write a
            # bash_profile shim so subsequent shell steps pick it up.
            if [ ! -d venv ]; then
              echo "::error::venv missing; install_script.sh must run before this action" >&2
              exit 1
            fi
            # Append only if not already present — multiple invocations of
            # this action otherwise stack duplicate `source` lines.
            activate_line="source $PWD/venv/bin/activate"
            touch ~/.bash_profile
            grep -qxF "$activate_line" ~/.bash_profile || echo "$activate_line" >> ~/.bash_profile
            . venv/bin/activate
          echo ::endgroup::
        fi
        echo ::group::Install python dependencies
          # Base deps (build_package_requirements.txt, tests/flow/requirements.txt)
          # are already installed by install_script.sh -> lib/setup-python.sh.
          # Only add the optional extras + call ./sbin/setup if the caller asked.
          if [[ "${{inputs.extra-packages-to-install}}" != "" ]]; then
            pip install ${{inputs.extra-packages-to-install}}
          fi
          if [[ "${{inputs.call-setup}}" == "1" ]]; then
            ./sbin/setup
          fi
        echo ::endgroup::
