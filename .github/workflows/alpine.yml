name: alpine

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      redis-ref:
        description: 'Redis ref to checkout'
        required: true
        default: 'unstable'
  workflow_call: # Allows to run this workflow from another workflow
    inputs:
      redis-ref:
        description: 'Redis ref to checkout'
        type: string
        required: true

jobs:
  alpine-x86:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: alpine:3
    steps:
      - name: Install prerequisites
        shell: sh
        run: |
          apk add bash make libtool tar cmake python3 python3-dev py3-pip gcc git curl build-base autoconf automake py3-cryptography linux-headers musl-dev libffi-dev openssl-dev openssh py-virtualenv clang18-libclang gcompat libstdc++ libgcc g++ openblas-dev xsimd git xz bsd-compat-headers clang18
      - name: git checkout
        run: |
          # Perform checkout
          REPO_URL="https://github.com/${{ github.repository }}.git"
          # Clone the repository to the current directory
          git clone --recurse-submodules --depth=1 $REPO_URL .
          git config --global --add safe.directory /__w/${{ github.repository }}
          REF=${{github.sha}}
          git fetch origin ${REF}
          git checkout ${REF}
      - name: Install python dependencies
        run: |
          pip install -q --upgrade setuptools wheel
          pip install -q --upgrade pip
          pip install -q -r tests/flow/requirements.txt
          pip install -q -r .install/build_package_requirements.txt
        env:
          PIP_BREAK_SYSTEM_PACKAGES: 1
      - name: checkout redis
        run: |
          # Perform checkout
          REPO_URL="https://github.com/redis/redis.git"
          # Clone the repository to the current directory
          git clone --recurse-submodules --depth=1 $REPO_URL redis
          cd redis
          git fetch origin ${{inputs.redis-ref}}
          git checkout ${{inputs.redis-ref}}
      - name: Build Redis
        working-directory: redis
        run: make install
      - name: Build module
        run: |
          make build -j `nproc`
      - name: Test
        run: |
          make test REDIS_SERVER=$GITHUB_WORKSPACE/redis/src/redis-server
      - name: Pack module
        run: |
          make pack BRANCH=${{ github.ref_name }}
      - name: Upload artifacts to S3
        uses: ./.github/actions/upload-artifacts-to-s3-without-make
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          github-ref: ${{ github.ref }}
  alpine-arm:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: alpine:3
    steps:
      - name: Install prerequisites
        shell: sh
        run: |
          apk add bash make libtool tar cmake python3 python3-dev py3-pip gcc git curl build-base autoconf automake py3-cryptography linux-headers musl-dev libffi-dev openssl-dev openssh py-virtualenv clang18-libclang gcompat libstdc++ libgcc g++ openblas-dev xsimd git xz bsd-compat-headers clang18
      - name: git checkout
        run: |
          # Perform checkout
          REPO_URL="
  alpine-arm64:
    runs-on: ubuntu24-arm64-4-16 # ubuntu24-arm64-2-8
    needs: setup-environment
    defaults:
      run:
        shell: bash
    env:
      TAGGED: ${{ needs.setup-environment.outputs.TAGGED }}
      VERSION: ${{ needs.setup-environment.outputs.TAG }}
      BRANCH: ${{ needs.setup-environment.outputs.BRANCH }}
      TAG_OR_BRANCH: ${{ needs.setup-environment.outputs.TAG_OR_BRANCH}}

      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      ACTIONS_RUNNER_FORCED_INTERNAL_NODE_VERSION: node16
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node16
    container:
      image: alpine:3 # required to run the job on the ARM instance
    steps:
      - name: Workaround alpine-arm64 GHA issues
        shell: sh
        run: |
          cp /etc/os-release /etc/os-release.bak
          sed -i 's/ID=alpine/ID=NotpineForGHA/g' /etc/os-release
      - name: Install prerequisites
        shell: sh
        run: |
          echo ::group::install packages
            apk add bash make libtool tar cmake python3 python3-dev \
            py3-pip gcc git curl build-base autoconf automake py3-cryptography \
            linux-headers musl-dev libffi-dev openssl-dev openssh py-virtualenv \
            clang18-libclang gcompat libstdc++ libgcc g++ openblas-dev \
            xsimd git xz bsd-compat-headers clang18 cargo
          echo ::endgroup::
      - name: git checkout
        run: |
          # Perform checkout
          REPO_URL="https://github.com/${{ github.repository }}.git"
          # Clone the repository to the current directory
          git clone --recurse-submodules --depth=1 $REPO_URL .
          git config --global --add safe.directory /__w/${{ github.repository }}
          REF=${{github.sha}}
          git fetch origin ${REF}
          git checkout ${REF}
      - name: checkout redis
        run: |
          # Perform checkout
          REPO_URL="https://github.com/redis/redis.git"
          # Clone the repository to the current directory
          git clone --recurse-submodules --depth=1 $REPO_URL redis
          cd redis
          git fetch origin ${{inputs.redis-ref}}
          git checkout ${{inputs.redis-ref}}
      - name: Install python dependencies
        run: |
          echo ::group::install requirements
            pip install -q --upgrade setuptools
            pip install -q --upgrade pip
            pip install -q -r tests/pytest/requirements.txt
            pip install -q -r .install/build_package_requirements.txt
          echo ::endgroup::
        env:
          PIP_BREAK_SYSTEM_PACKAGES: 1
      - name: build
        uses: ./.github/actions/build-json-module-and-redis
      - name: Test
        run: |
          make test
      - name: Pack module
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE # to avoid git error
          mv /etc/os-release.bak /etc/os-release
          make pack BRANCH=$TAG_OR_BRANCH SHOW=1
          sed -i 's/ID=alpine/ID=NotpineForGHA/g' /etc/os-release
      - name: Upload artifacts to S3
        uses: ./.github/actions/upload-artifacts-to-s3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          github-ref: ${{ github.ref }}
